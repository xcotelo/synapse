logging:
  level:
    org:
      hibernate:
        SQL: debug

spring:
  datasource:
    # Use in-memory H2 database for tests to avoid requiring a local PostgreSQL instance
    url: jdbc:h2:mem:synapse_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop

  sql:
    init:
      mode: never

  jackson:
    default-property-inclusion: NON_NULL

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Placeholder so LlamaAIService starts in tests (AI is not called in tests that don't need it)
API_KEY_LLAMA: "test-key"

project:
  jwt:
    signKey: WzROun12eUiDvko3UrJ74gNeJz2TWEWPMTh6DxyE8HWXIf4hETUrkM4IUGqqHq66PuVS
    expirationMinutes: 1440
  notes:
    dir: target/test-digital-brain-notes
  cors:
    allowed-origins: http://localhost:3000,http://localhost:8080
